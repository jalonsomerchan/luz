<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#071311">
    <meta name="description" content="Consulta el precio de la luz por horas: hoy, semana, mes, estadísticas y buscador de días.">
    <title>Luz al día · Precio de la luz por horas</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://alon.one">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/layout.css">
    <link rel="stylesheet" href="./src/styles/components.css">
  </head>
  <body>
    <noscript>Necesitas activar JavaScript para consultar el precio de la luz.</noscript>
    <div id="app"></div>
    <script src="./config.js"></script>
    <script>
      window.__LUZ_CONFIG_READY__ = fetch('./config.generated.js', { cache: 'no-store' })
        .then((response) => response.ok ? response.text() : '')
        .then((code) => {
          if (code.trim()) {
            (0, eval)(code);
          }
        })
        .catch(() => {});
    </script>
    <script type="module">
      await window.__LUZ_CONFIG_READY__;
      await import('./src/app.js');
    </script>
  </body>
</html>
